name: CI Automation

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Backend & Frontend E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: asdasdasd
          POSTGRES_DB: universal_stock_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install backend dependencies
      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run database migrations (self-contained, works on empty DB)
      - name: Run Database Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:asdasdasd@localhost:5432/universal_stock_db
        run: |
          alembic upgrade head

      # 5. Execute Backend unit tests
      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:asdasdasd@localhost:5432/universal_stock_db
        run: |
          pytest

      # 6. Start backend FastAPI server in background
      - name: Start Backend API Server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:asdasdasd@localhost:5432/universal_stock_db
          APP_ENV: development
          SECRET_KEY: test-secret-key-1234567890-long-enough-string
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait a few seconds for FastAPI server to start
          sleep 5

      # 7. Setup Node.js environment
      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # 8. Install frontend dependencies
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      # 9. Install Playwright browser binaries
      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      # 10. Run Frontend E2E tests
      - name: Run Playwright E2E Tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd frontend
          npm run test:e2e

      # 11. Upload Playwright report on failure
      - name: Upload Playwright Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retries: 1
