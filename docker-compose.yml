version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ustock_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: asdasdasd
      POSTGRES_DB: universal_stock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ustock_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:asdasdasd@db:5432/universal_stock_db
      - APP_ENV=production
      - SECRET_KEY=your-production-secret-key-change-in-real-deployment
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ustock_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
